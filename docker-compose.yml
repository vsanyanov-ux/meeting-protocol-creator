services:
  backend:
    build: ./backend
    container_name: mpc-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/temp_protocols:/app/temp_protocols
      - ./backend/models_cache:/app/models_cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      mpc-network:
        aliases:
          - backend

  ollama:
    image: ollama/ollama:latest
    container_name: mpc-ollama
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - mpc-network

  frontend:
    build: ./frontend
    container_name: mpc-frontend
    ports:
      - "90:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mpc-network

networks:
  mpc-network:
    driver: bridge
